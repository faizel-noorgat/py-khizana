failure_modes:
  - id: "FM-001"
    scenario: "External LLM API (OpenAI, Claude, etc.) is down or rate-limited when processing document"
    affected_components: ["CMP-003", "CMP-004", "CMP-009"]
    expected_behavior: "GRACEFUL_DEGRADE"
    details: |
      - Document ingestion queues the job with retry policy (exponential backoff)
      - Search works for already-indexed documents
      - User sees "processing delayed" status for pending documents
      - Categorization waits for all documents to be tagged
    severity: "MEDIUM"
  - id: "FM-002"
    scenario: "External ISBN lookup service fails during ebook processing"
    affected_components: ["CMP-008"]
    expected_behavior: "GRACEFUL_DEGRADE"
    details: |
      - Ebook is still indexed with filename as title
      - Missing metadata flagged for later enrichment
      - User can manually trigger metadata refresh later
    severity: "LOW"
  - id: "FM-003"
    scenario: "The vector index database crashes or becomes unreachable"
    affected_components: ["CMP-005", "CMP-003"]
    expected_behavior: "FAIL_WITH_ERROR"
    details: |
      - Search returns "index unavailable" error
      - Document processing queues new embeddings until index recovers
      - No data loss - embeddings can be regenerated
    severity: "HIGH"
  - id: "FM-004"
    scenario: "Monitored folder becomes unavailable (network drive offline, permissions changed)"
    affected_components: ["CMP-003", "CMP-006"]
    expected_behavior: "GRACEFUL_DEGRADE"
    details: |
      - System logs error, continues with accessible folders
      - Index retains previous state of those files
      - Admin notified of access failure
    severity: "MEDIUM"
  - id: "FM-005"
    scenario: "Google/Microsoft OAuth is down during login"
    affected_components: ["CMP-009"]
    expected_behavior: "GRACEFUL_DEGRADE"
    details: |
      - User cannot log in during outage
      - Already-authenticated sessions continue to work
      - Admin can use local fallback auth if configured
    severity: "LOW"
  - id: "FM-006"
    scenario: "Background worker crashes mid-document-processing"
    affected_components: ["CMP-003", "CMP-004"]
    expected_behavior: "QUEUE_AND_RETRY"
    details: |
      - Each document is an independent job - no system state corruption
      - Job is re-queued automatically when worker restarts
      - No partial index corruption - vector database handles atomic writes
    severity: "MEDIUM"
  - id: "FM-007"
    scenario: "Organization Engine fails while moving files (disk full, permissions, crash)"
    affected_components: ["CMP-006"]
    expected_behavior: "GRACEFUL_DEGRADE"
    details: |
      - Each file move is logged before execution
      - Failed moves are tracked and can be resumed
      - Admin can review move log and rollback if needed
      - Original files remain until move confirmed
    severity: "MEDIUM"
  - id: "FM-008"
    scenario: "LLM returns invalid embedding or timeout for a specific document"
    affected_components: ["CMP-003"]
    expected_behavior: "QUEUE_AND_RETRY"
    details: |
      - Single document fails, others continue
      - Job retried with exponential backoff (up to 3 attempts)
      - After max retries, document flagged for manual review
    severity: "LOW"

