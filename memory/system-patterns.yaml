data_flows:
  - id: "DF-001"
    name: "Document Ingestion Pipeline"
    description: "How a file goes from discovery to searchable"
    steps:
      - step: 1
        actor: "Background Worker"
        action: "Discovers"
        what: "New or changed file in monitored folder"
        to: "Document Processor"
      - step: 2
        actor: "Document Processor"
        action: "Parses"
        what: "File content"
        to: "Internal buffer"
      - step: 3
        actor: "Document Processor"
        action: "Requests"
        what: "Embedding from LLM API"
        to: "External LLM Provider"
      - step: 4
        actor: "Document Processor"
        action: "Generates"
        what: "Auto-tags based on content analysis"
        to: "Tag list"
      - step: 5
        actor: "Document Processor"
        action: "Stores"
        what: "Metadata, embedding, tags"
        to: "Index Store"
        emits: "Document indexed event"
  - id: "DF-002"
    name: "Semantic Search Query"
    description: "How a natural language query returns relevant documents"
    steps:
      - step: 1
        actor: "End User"
        action: "Submits"
        what: "Natural language search query"
        to: "User Interface"
      - step: 2
        actor: "Search Engine"
        action: "Generates"
        what: "Query embedding"
        to: "Internal"
      - step: 3
        actor: "Search Engine"
        action: "Queries"
        what: "Vector similarity search + BM25"
        to: "Index Store"
      - step: 4
        actor: "Search Engine"
        action: "Returns"
        what: "Ranked document results"
        to: "User Interface"
  - id: "DF-003"
    name: "Collection Organization"
    description: "How documents get reorganized into folders"
    steps:
      - step: 1
        actor: "Scheduled Job"
        action: "Triggers"
        what: "Categorization run (after bulk processing threshold)"
        to: "Categorization Engine"
      - step: 2
        actor: "Categorization Engine"
        action: "Analyzes"
        what: "All tagged documents together"
        to: "Internal"
      - step: 3
        actor: "Categorization Engine"
        action: "Proposes"
        what: "Folder structure and category assignments"
        to: "Organization Engine"
      - step: 4
        actor: "Organization Engine"
        action: "Executes or Queues"
        what: "File moves and renames (based on admin setting: manual approval vs auto-execute)"
        to: "File System"
        emits: "Organization complete event"

