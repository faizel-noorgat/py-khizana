    - "Media files (images, videos, audio)"
    - "Local network deployment (webserver on LAN)"
    - "AI-powered semantic search (RAG + BM25)"
    - "Automatic file organization and deduplication"
    - "User profiling via AI interview"
    - "Git-like version history"
  out_of_scope:
    - "Air-gap mode with local LLM models (post-MVP)"
    - "Native mobile application"
    - "Advanced analytics and reporting dashboards"

