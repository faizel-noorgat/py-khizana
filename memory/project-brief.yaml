raw_vision: |
  Its run as a webserver on my local network that has access to all my computers. It essentially an ai powered file organization and retrieval engine. Uses a custom pipeline to process documents in shared locations. For most documents we use some parsing libraries to parse the documents, use agentic rag to chunk and create embeddings, uses different voyager embeddings models depending on the content type. Based on an initial interview with me the app will know me, based on my likes, dislikes, work, business, interests, hobbies, etc. Based on this understand and tagging and categorization of documents, meta data descriptions, the app will re-organize the documents. for ebooks, pdfs and epubs, these will go through a isbn validation, i.e. check the book for isbn number, i found a repo that has this code built out that we can reuse. for non ebook pdfs, these will be treated exactly the same as other documents. we will have an exclusion list of files, such as binaries, and python project folders, unsure about having an inclusion list.

  On the search side we can use rag to find the documents that we are looking for and maybe bm25. I have some documentation for advanced rag techniques that i want to use. You can create a reference folder in the project and i can drop the files there.

overview: "Users with scattered digital files across multiple devices and storage systems need AI-powered organization, deduplication, and semantic search to find and manage documents in seconds instead of minutes."
current_landscape: |
  25 years of accumulated files scattered across multiple computers, cloud storage (Google Drive, OneDrive, Dropbox), NAS, and external drives. Current organization attempts fail due to:
  - Creating too many folder levels, becoming unusable
  - Forgetting conventions (e.g., "resources vs areas" — where does something go?)
  - Duplication across devices and drives with no deduplication
  - 15+ minutes wasted navigating folders before starting work
  - No unified search across all document types (Excel, Word, PDFs, ebooks)
  - No version history or way to track file changes over time
  - Existing tools (OS search, NAS indexing) don't understand content or context

goals:
  - id: "G-001"
    description: "Reduce document search time from 15+ minutes to seconds"
  - id: "G-002"
    description: "Automate file organization using AI based on user context and document content"
  - id: "G-003"
    description: "Eliminate duplicate files across devices and storage systems"
  - id: "G-004"
    description: "Provide semantic search across all document types (PDF, Office, ebooks, etc.)"
  - id: "G-005"
    description: "Track file changes with git-like version history (branches, commits, diffs)"
  - id: "G-006"
    description: "Offload cognitive burden of sorting/organizing for users with ADHD/attention challenges"

scope:
