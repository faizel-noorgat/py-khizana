glossary:
  - term: "RAG"
    definition: "Retrieval-Augmented Generation - combining search with AI to find and summarize documents"
  - term: "Agentic Chunking"
    definition: "Advanced RAG strategy using LLM as agent to decide where text chunks start/end based on meaning, not rigid rules"
  - term: "Agentic RAG"
    definition: "RAG with autonomous agents that can reason about retrieval and make decisions"
  - term: "BM25"
    definition: "Ranking algorithm for text search relevance based on term frequency"
  - term: "Embeddings"
    definition: "Vector representations of text for semantic similarity matching"
  - term: "Voyager"
    definition: "Embedding model family for different content types"
  - term: "ISBN"
    definition: "International Standard Book Number - unique identifier for books"
  - term: "Air-gap"
    definition: "Isolated system with no network connectivity to external services"
  - term: "User Profile"
    definition: "AI-learned preferences about user's work, interests, hobbies for better categorization"