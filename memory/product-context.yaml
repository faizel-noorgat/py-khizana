    description: "Developer procrastination or loss of momentum on solo project"
    likelihood: "MEDIUM"
    impact: "HIGH"
    mitigation: "Break work into small deliverables, maintain visible progress tracking, regular commit schedule"
  - id: "R-002"
    description: "LLM API costs may scale unexpectedly with large document collections"
    likelihood: "MEDIUM"
    impact: "MEDIUM"
    mitigation: "Implement caching, batch processing, and cost monitoring from start"

